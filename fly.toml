app = "fabian-quintana-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_NAME = "Fabián Quintana Salón"
  APP_ENV = "production"
  APP_DEBUG = "false"
  LOG_CHANNEL = "stack"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  checks = [
    { type = "http", path = "/", interval = "10s", timeout = "2s", grace_period = "5s" },
    { type = "tcp", port = 8000, interval = "15s", timeout = "2s", grace_period = "5s" }
  ]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[services.tcp_checks]]
  interval = "15s"
  timeout = "2s"
  restart_limit = 0
  grace_period = "5s"

[deploy]
  strategy = "rolling"

[experimental]
  allowed_public_ports = []
  auto_rollback = true

[[vm]]
  memory = "1gb"
  cpus = 1